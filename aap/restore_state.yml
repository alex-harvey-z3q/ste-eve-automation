---
- name: Restore device configs to lab (IOS/IOS-XE example)
  hosts: lab_devices
  gather_facts: false
  vars:
    booking_id: "{{ booking_id }}"
    state_root: "{{ state_root | default('state') }}"
    state_dir: "{{ state_root }}/{{ booking_id }}"
  tasks:
    - name: Ensure state exists
      delegate_to: localhost
      stat:
        path: "{{ state_dir }}"
      register: st

    - name: Fail if no state directory
      when: not st.stat.exists
      fail:
        msg: "No saved state found at {{ state_dir }} for booking_id={{ booking_id }}."

    - name: Read saved running-config
      delegate_to: localhost
      slurp:
        src: "{{ state_dir }}/{{ inventory_hostname }}.running.cfg"
      register: cfg_file

    - name: Push config to device
      cisco.ios.ios_config:
        lines: "{{ (cfg_file.content | b64decode).splitlines() }}"
        save_when: modified